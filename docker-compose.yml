services:
  app:
    image: locida:latest
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: locida
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:delegated
      - vendor_data:/var/www/html/vendor
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - locida

  nginx:
    image: nginx:1.27-alpine
    container_name: locida-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - locida

  db:
    image: postgres:16-alpine
    container_name: locida-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: locida
      POSTGRES_USER: locida
      POSTGRES_PASSWORD: locida
      PGPORT: 15432
    command: ["postgres", "-p", "15432"]
    ports:
      - "15432:15432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locida -d locida -h 127.0.0.1 -p 15432"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - locida

  redis:
    image: redis:7-alpine
    container_name: locida-redis
    restart: unless-stopped
    command: ["redis-server", "--port", "16379"]
    ports:
      - "16379:16379"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "16379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - redis_data:/data
    networks:
      - locida

  gitea:
    image: gitea/gitea:latest
    container_name: locida-gitea
    restart: unless-stopped
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__server__ROOT_URL: http://localhost:3000/
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea_data:/data
    networks:
      - locida

  act-runner:
    image: gitea/act_runner:latest
    container_name: locida-act-runner
    restart: unless-stopped
    depends_on:
      - gitea
    environment:
      GITEA_INSTANCE_URL: http://host.docker.internal:3000
      GITEA_RUNNER_REGISTRATION_TOKEN: ${GITEA_RUNNER_REGISTRATION_TOKEN}
      GITEA_RUNNER_NAME: locida-act-runner
    volumes:
      - act_runner_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    command: >-
      sh -c "
      if [ ! -f /data/.runner ]; then
        act_runner register --no-interactive --instance $$GITEA_INSTANCE_URL --token $$GITEA_RUNNER_REGISTRATION_TOKEN --name $$GITEA_RUNNER_NAME;
      fi;
      act_runner daemon --config /data/config.yaml
      "
    networks:
      - locida

volumes:
  db_data:
  redis_data:
  vendor_data:
  storage_data:
  gitea_data:
  act_runner_data:

networks:
  locida:
    driver: bridge
