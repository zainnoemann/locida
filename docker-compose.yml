services:
  app:
    image: locida:latest
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: locida
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:delegated
      - vendor_data:/var/www/html/vendor
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - locida

  nginx:
    image: nginx:1.27-alpine
    container_name: locida-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - locida

  db:
    image: postgres:16-alpine
    container_name: locida-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: locida
      POSTGRES_USER: locida
      POSTGRES_PASSWORD: locida
      PGPORT: 15432
    command: ["postgres", "-p", "15432"]
    ports:
      - "15432:15432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locida -d locida -h 127.0.0.1 -p 15432"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - locida

  redis:
    image: redis:7-alpine
    container_name: locida-redis
    restart: unless-stopped
    command: ["redis-server", "--port", "16379"]
    ports:
      - "16379:16379"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "16379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - redisdata:/data
    networks:
      - locida

volumes:
  dbdata:
  redisdata:
  vendor_data:
  storage_data:

networks:
  locida:
    driver: bridge
